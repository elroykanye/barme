{{- if not .Values.auth.existingSecret }}
{{- $secretName := include "barme.fullname" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $access := .Values.auth.accessKey -}}
{{- $secret := .Values.auth.secretKey -}}
{{- $master := .Values.auth.masterKey -}}
{{/* Preserve already-generated values across upgrades: a regenerated master key
     would make stored secrets unrecoverable. */}}
{{- if $existing -}}
{{- if and (not $access) (hasKey $existing.data "BARME_ACCESS_KEY") }}{{ $access = index $existing.data "BARME_ACCESS_KEY" | b64dec }}{{ end -}}
{{- if and (not $secret) (hasKey $existing.data "BARME_SECRET_KEY") }}{{ $secret = index $existing.data "BARME_SECRET_KEY" | b64dec }}{{ end -}}
{{- if and (not $master) (hasKey $existing.data "BARME_MASTER_KEY") }}{{ $master = index $existing.data "BARME_MASTER_KEY" | b64dec }}{{ end -}}
{{- end -}}
{{- if not $access }}{{ $access = printf "barme-%s" (randAlphaNum 12 | lower) }}{{ end -}}
{{- if not $secret }}{{ $secret = randAlphaNum 40 }}{{ end -}}
{{/* sha256sum yields exactly 64 hex chars = a valid 32-byte master key. */}}
{{- if not $master }}{{ $master = sha256sum (randAlphaNum 64) }}{{ end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "barme.labels" . | nindent 4 }}
type: Opaque
data:
  BARME_ACCESS_KEY: {{ $access | b64enc | quote }}
  BARME_SECRET_KEY: {{ $secret | b64enc | quote }}
  BARME_MASTER_KEY: {{ $master | b64enc | quote }}
{{- end }}
