name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: barmed
            asset: barmed-linux-x86_64
          - os: windows-latest
            bin: barmed.exe
            asset: barmed-windows-x86_64.exe
          - os: macos-latest
            bin: barmed
            asset: barmed-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Node is needed by barmed's build script to compile the embedded console.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build barmed (with embedded UI)
        run: cargo build --release -p barmed --features ui

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

  # Build the Docker image once and publish it to Docker Hub, tagged with the
  # version and `latest`. Needs two repo secrets: DOCKERHUB_USERNAME and
  # DOCKERHUB_TOKEN (a Docker Hub access token).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/barme
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sync the Docker Hub short description and overview from the repo, so the
      # page isn't blank. Uses the same credentials as the push above.
      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/barme
          short-description: "A content-addressed object store that speaks S3."
          readme-filepath: ./docs/DOCKERHUB.md
