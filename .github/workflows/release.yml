name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bin: barmed
            asset: barmed-linux-x86_64
          - os: windows-latest
            bin: barmed.exe
            asset: barmed-windows-x86_64.exe
          - os: macos-latest
            bin: barmed
            asset: barmed-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Node is needed by barmed's build script to compile the embedded console.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build barmed (with embedded UI)
        run: cargo build --release -p barmed --features ui

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
