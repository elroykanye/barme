    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#f0954a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f0954a" stop-opacity="0"/>
    </radialGradient>
